<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Boks sistem</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1 id="boxTitle">Učitavanje boksa...</h1>

  <!-- PAS -->
  <div class="card">
    <h2>🐕 Pas</h2>
    <div id="dogInfo">Učitavanje...</div>
  </div>

  <!-- KRPILJI -->
  <div class="card">
    <h2>🐛 Krpelji</h2>
    <div id="krpelji">Učitavanje...</div>
    <button onclick="addKrpelji()">+ Novi unos</button>
  </div>

  <!-- PARAZITI -->
  <div class="card">
    <h2>🪱 Paraziti</h2>
    <div id="paraziti">Učitavanje...</div>
    <button onclick="addParaziti()">+ Novi unos</button>
  </div>

  <!-- CISCENJE -->
  <div class="card">
    <h2>🧽 Čišćenje boksa</h2>
    <div id="ciscenje">Učitavanje...</div>
    <button onclick="addCiscenje()">+ Novi unos</button>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
