<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QR Print</title>

  <style>
    body {
      font-family: Arial;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 20px;
    }

    .box {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
      page-break-inside: avoid;
    }

    img {
      width: 160px;
      height: 160px;
    }

    .name {
      font-weight: bold;
      margin-bottom: 5px;
    }

    @media print {
      .box {
        break-inside: avoid;
      }
    }
  </style>
</head>

<body>

<h2 style="text-align:center;">QR KODOVI ZA BOKSEVE</h2>

<div id="grid">Loading...</div>

<script src="config.js"></script>

<script>
const API = CONFIG.API_URL;

const BASE_URL = window.location.origin + "/boks.html?prostor=";

fetch(API + "?action=getAllBoxes")
  .then(r => r.json())
  .then(data => {

    const grid = document.getElementById("grid");

    if(!Array.isArray(data)){
      grid.innerHTML = "ERROR LOADING DATA";
      return;
    }

    grid.innerHTML = data.map(p => {

      const id = p[0];
      const name = p[2];

      const url = window.location.origin + "/boks.html?prostor=" + id;

      const qr = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(url);

      return `
        <div class="box">
          <div class="name">${name}</div>
          <div>${id}</div>
          <img src="${qr}">
        </div>
      `;
    }).join("");

  })
  .catch(err => {
    document.getElementById("grid").innerHTML = "ERROR: " + err;
  });
</script>

</body>
</html>
