<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR Print</title>
<style>
  body { font-family: Arial; }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
  }
  .box {
    border: 1px solid #000;
    padding: 10px;
    text-align: center;
  }
  img { width: 120px; }
</style>
</head>
<body>

<h2>QR etikete - boksevi</h2>
<div id="grid" class="grid"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbxjRNExBlTo99eYDD8LQjw2DGX_n9KY5es-XirSXzu5WGddOvZoBPfJV2GfJiyRRiQ_/exec";

fetch(API + "?action=getAllBoxes")
  .then(r => r.json())
  .then(data => {

    const grid = document.getElementById("grid");

    data.forEach(b => {

      const id = b[0];
      const naziv = b[2];

      const url = window.location.origin +
        "/boks.html?prostor=" + id;

      grid.innerHTML += `
        <div class="box">
          <h4>${naziv}</h4>
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(url)}">
          <p>${id}</p>
        </div>
      `;
    });

  });
</script>

</body>
</html>
